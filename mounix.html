<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOUNIX: Cursed Technique</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
        #ui { position: absolute; top: 10%; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        h1 { font-size: 3rem; margin: 0; letter-spacing: 10px; font-weight: 900; text-shadow: 0 0 20px rgba(0, 255, 255, 0.5); background: linear-gradient(to bottom, #fff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #technique-name { font-size: 1.2rem; color: #00ffff; margin-top: 15px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        #video-container { position: absolute; bottom: 2%; left: 18%; transform: translateX(-50%) scaleX(-1); width: 85vw; max-width: 450px; height: 42vh; border: 2px solid rgba(255, 255, 255, 0.2); z-index: 20; background-color: #000; border-radius: 25px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="ui">
        <h1>MOUNIX</h1>
        <div id="technique-name">READY TO UNLEASH</div>
    </div>
    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 55;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const COUNT = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
    scene.add(particles);

    // --- وظيفة الرسم بالسبابة ---
    let trailIdx = 0;
    const TRAIL_START = 15000; // نخصص آخر 5000 جسيم للرسم
    function drawWithFinger(x, y) {
        const i = TRAIL_START + trailIdx;
        targetPositions[i*3] = (x - 0.5) * 120;
        targetPositions[i*3+1] = (0.5 - y) * 120;
        targetPositions[i*3+2] = 0;
        targetColors[i*3] = 0; targetColors[i*3+1] = 1; targetColors[i*3+2] = 1; // لون سيان للرسم
        targetSizes[i] = 2.0;
        trailIdx = (trailIdx + 1) % 5000;
    }

    // نسخ الوظائف الأصلية (Red, Void, Purple, Shrine)
    function getRed(i) {
        if(i < 2000) return { x: (Math.random()-0.5)*15, y: (Math.random()-0.5)*15, z: (Math.random()-0.5)*15, r: 1, g: 0.1, b: 0.1, s: 3 };
        const t = i/COUNT; const a = t*20; const r = 5 + t*30;
        return { x: r*Math.cos(a), y: r*Math.sin(a), z: (Math.random()-0.5)*5, r: 0.8, g: 0, b: 0, s: 1 };
    }

    function getVoid(i) {
        const r = 30 + Math.random()*50; const theta = Math.random()*Math.PI*2; const phi = Math.acos(2*Math.random()-1);
        return { x: r*Math.sin(phi)*Math.cos(theta), y: r*Math.sin(phi)*Math.sin(theta), z: r*Math.cos(phi), r: 0.1, g: 0.5, b: 1, s: 0.8 };
    }

    function getPurple(i) {
        const r = 18; const t = Math.random()*Math.PI*2; const p = Math.acos(2*Math.random()-1);
        return { x: r*Math.sin(p)*Math.cos(t), y: r*Math.sin(p)*Math.sin(t), z: r*Math.cos(p), r: 0.5, g: 0, b: 1, s: 2.5 };
    }

    function getShrine(i) {
        return { x: (Math.random()-0.5)*60, y: -20 + Math.random()*40, z: (Math.random()-0.5)*20, r: 0.3, g: 0, b: 0, s: 0.5 };
    }

    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    let currentTech = 'neutral';

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        let detected = 'neutral';
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: '#00ffff', lineWidth: 2});
            
            const isUp = (t, p) => lm[t].y < lm[p].y;
            const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
            
            if (pinch < 0.04) detected = 'purple';
            else if (isUp(8,6) && isUp(12,10) && isUp(16,14) && isUp(20,18)) detected = 'shrine';
            else if (isUp(8,6) && isUp(12,10) && !isUp(16,14)) detected = 'void';
            else if (isUp(8,6) && !isUp(12,10)) {
                detected = 'red';
                drawWithFinger(lm[8].x, lm[8].y); // الرسم بالسبابة أثناء وضعية Red
            }
        }
        updateState(detected);
    });

    function updateState(tech) {
        if(currentTech === tech) return;
        currentTech = tech;
        const nameEl = document.getElementById('technique-name');
        
        if(tech === 'shrine') nameEl.innerText = "MOUNIX: Malevolent Shrine";
        else if(tech === 'purple') nameEl.innerText = "MOUNIX: Hollow Purple";
        else if(tech === 'void') nameEl.innerText = "MOUNIX: Infinite Void";
        else if(tech === 'red') nameEl.innerText = "MOUNIX: Red & Drawing Mode";
        else nameEl.innerText = "MOUNIX: Cursed Energy";

        for(let i=0; i<TRAIL_START; i++) {
            let p;
            if(tech === 'red') p = getRed(i);
            else if(tech === 'void') p = getVoid(i);
            else if(tech === 'purple') p = getPurple(i);
            else if(tech === 'shrine') p = getShrine(i);
            else p = { x: (Math.random()-0.5)*40, y: (Math.random()-0.5)*40, z: (Math.random()-0.5)*40, r: 0.1, g: 0.1, b: 0.2, s: 0.2 };
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    function animate() {
        requestAnimationFrame(animate);
        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;
        const siz = particles.geometry.attributes.size.array;

        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.1;
            col[i] += (targetColors[i] - col[i]) * 0.1;
        }
        for(let i=0; i<COUNT; i++) siz[i] += (targetSizes[i] - siz[i]) * 0.1;

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        particles.geometry.attributes.size.needsUpdate = true;
        
        if (currentTech !== 'shrine') particles.rotation.y += 0.01;
        composer.render();
    }
    animate();
</script>
</body>
</html>
